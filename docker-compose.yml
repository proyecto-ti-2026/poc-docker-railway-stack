services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - ./backend/src/main/resources/db/migration/V1__crear_restaurantes.sql:/docker-entrypoint-initdb.d/1-init.sql
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file: ./.env
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/marketplace
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app # hot-reload con Spring DevTools
    depends_on:
      - db

volumes:
  pgdata:
